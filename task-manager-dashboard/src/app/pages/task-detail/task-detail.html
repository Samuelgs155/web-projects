@if (task) {
  <section class="container py-5">
    <div class="card shadow-lg border-0 mx-auto" style="max-width: 700px;">
      <img
        [src]="'/' + task.image_url"
        class="card-img-top p-4"
        alt="Task image"
        style="max-height: 250px; object-fit: contain;"
      />

      <div class="card-body">
        <h1 class="card-title mb-3">
          {{ task.title }}
        </h1>

        <p class="text-muted">
          {{ task.description }}
        </p>

        <span class="badge bg-info text-dark fs-6 mb-4">
          {{ task.status }}
        </span>

        <div class="mt-4">
          <a routerLink="/tasks" class="btn btn-secondary me-2">
            ← Back
          </a>

          <a
            [routerLink]="['/tasks', task.id, 'edit']"
            class="btn btn-warning"
          >
            Edit Task
          </a>
        </div>
      </div>
    </div>
  </section>
} @else {
  <section class="container py-5 text-center">
    <div class="spinner-border text-primary"></div>
    <p class="mt-3 text-muted">Loading task...</p>
  </section>
}
