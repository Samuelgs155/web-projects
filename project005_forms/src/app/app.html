<div>
  <h1>Article Admin</h1>
  @if (thereAreArticles()) {
  <table>
    <thead>
      <tr>
        <th>Code</th>
        <th>Description</th>
        <th>Price</th>
        <th>Remove</th>
        <th>Select</th>
      </tr>
    </thead>
    <tbody>
      @for(art of articles; track article.code) {
      <tr>
        <td>{{art.code}}</td>
        <td>{{art.description}}</td>
        <td>{{art.price}}</td>
        <td><button (click)="removeAnArticle(art.code)">Remove?</button></td>
        <td><button (click)="selectArticle(art)">Select?</button></td>
      </tr>
      }
    </tbody>
  </table>
  } @else {
  <p>There are any articles.</p>
  }

  <div>
    <p>
      Code:<input type="number" [(ngModel)]="article.code" />
    </p>
    <p>
      description:<input type="text" [(ngModel)]="article.description" />
    </p>
    <p>
      price:<input type="number" [(ngModel)]="article.price" />
    </p>
    <p>
      <button (click)="addAnArticle()">Add</button>
      <button (click)="updateArticle()">update</button>
    </p>
  </div>
</div>

<router-outlet />
